<!DOCTYPE html>
<!-- Declara que este arquivo é um documento HTML5 -->
<html lang="pt-BR">
<!-- Inicia o elemento root do HTML e define o idioma como Português do Brasil -->
<head> <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/686/686589.png">
  <meta charset="UTF-8">
  <!-- Define a codificação de caracteres como UTF-8 -->
  <title>Meu Portal de Jogos</title>
  <!-- Define o título que aparece na aba do navegador -->
  <style>
    /* Estilos para o corpo da página */
    body {
      margin: 0; /* Remove a margem padrão do navegador */
      font-family: Arial, sans-serif; /* Define a fonte usada na página */
      background: #0f172a; /* Define a cor de fundo da página */
      color: white; /* Define a cor padrão do texto como branco */
      text-align: center; /* Alinha todo o texto ao centro */
    }

    /* Estilos para o cabeçalho da página */
    header {
      padding: 20px; /* Espaçamento interno ao redor do texto do cabeçalho */
      background: #1e293b; /* Cor de fundo do cabeçalho */
      font-size: 24px; /* Tamanho da fonte do cabeçalho */
      font-weight: bold; /* Texto em negrito no cabeçalho */
    }

    /* Estilos para o contêiner que agrupa os jogos */
    .games {
      display: grid; /* Usa layout de grade para os cartões de jogos */
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); /* Define colunas flexíveis */
      gap: 20px; /* Espaçamento entre os cartões */
      padding: 20px; /* Espaçamento interno do contêiner */
    }

    /* Estilos para cada cartão de jogo */
    .card {
      background: #1e293b; /* Cor de fundo do cartão */
      border-radius: 12px; /* Cantos arredondados no cartão */
      padding: 15px; /* Espaçamento interno do cartão */
      transition: 0.3s; /* Animação suave ao passar o mouse */
    }

    /* Estilos aplicados quando o cursor passa sobre o cartão */
    .card:hover {
      transform: scale(1.05); /* Aumenta levemente o cartão */
      background: #334155; /* Muda a cor de fundo do cartão */
    }

    /* Estilos para os iframes que incorporam os jogos */
    iframe {
      width: 100%; /* Largura total do contêiner pai */
      height: 150px; /* Altura fixa do iframe */
      border: none; /* Remove a borda padrão do iframe */
      border-radius: 8px; /* Cantos arredondados no iframe */
    }

    /* Estilos para os links de jogar */
    a {
      display: block; /* Faz o link ocupar uma linha inteira */
      margin-top: 10px; /* Espaço acima do link */
      color: #38bdf8; /* Cor do texto do link */
      text-decoration: none; /* Remove o sublinhado do link */
    }
  </style>
</head>
<body>

<header>🎮 Games</header>
<!-- Cabeçalho principal com o título do portal -->

<div class="games">
<!-- Contêiner que agrupa todos os cards de jogos -->

  <div class="card">
    <!-- Primeiro cartão de jogo -->
   <img src="https://via.placeholder.com/200x150" alt="Jogo" style="width:100%; border-radius:8px;">
  </div>

  <div class="card">
    <!-- Segundo cartão de jogo -->
   <a href="snake.html">🐍 Jogar Snake</a>
  </div>

  <div class="card">
    <!-- Terceiro cartão de jogo -->
    <iframe src="https://www.crazygames.com/embed/2048"></iframe>
    <!-- Incorpora o jogo 2048 via iframe -->
    <a href="https://www.crazygames.com/game/2048" target="_blank">Jogar 2048</a>
    <!-- Link que abre o jogo 2048 em nova aba -->
  </div>

</div>

</body>
</html>
