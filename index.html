<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Meu Portal de Jogos</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    header {
      padding: 20px;
      background: #1e293b;
      font-size: 24px;
      font-weight: bold;
    }

    .games {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      border-radius: 12px;
      padding: 15px;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
      background: #334155;
    }

    iframe {
      width: 100%;
      height: 150px;
      border: none;
      border-radius: 8px;
    }

    a {
      display: block;
      margin-top: 10px;
      color: #38bdf8;
      text-decoration: none;
    }
  </style>
</head>
<body>

<header>🎮 Meu Portal de Jogos</header>

<div class="games">

  <div class="card">
    <iframe src="https://www.crazygames.com/embed/slope"></iframe>
    <a href="https://www.crazygames.com/game/slope" target="_blank">Jogar Slope</a>
  </div>

  <div class="card">
    <iframe src="https://www.crazygames.com/embed/moto-x3m"></iframe>
    <a href="https://www.crazygames.com/game/moto-x3m" target="_blank">Jogar Moto X3M</a>
  </div>

  <div class="card">
    <iframe src="https://www.crazygames.com/embed/2048"></iframe>
    <a href="https://www.crazygames.com/game/2048" target="_blank">Jogar 2048</a>
  </div>

</div>

</body>
</html>
