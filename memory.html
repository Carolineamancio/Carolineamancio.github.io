<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jogo da Memória</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at top left, #38bdf8 10%, transparent 40%),
                  radial-gradient(circle at bottom right, #f472b6 10%, transparent 28%),
                  linear-gradient(180deg, #e9d313 0%, #db1d10 100%);
      color: #f8fafc;
    }

    .game {
      width: min(380px, calc(100% - 32px));
      padding: 24px;
      border-radius: 24px;
      background: rgba(15, 23, 42, 0.88);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.28);
    }

    h1 {
      margin: 0 0 16px;
      font-size: 2rem;
      text-align: center;
    }

    .status {
      display: flex;
      justify-content: space-between;
      margin-bottom: 16px;
      gap: 12px;
      color: #cbd5e1;
      font-size: 0.98rem;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 18px;
    }

    .card {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 16px;
      border: 2px solid rgba(255, 255, 255, 0.12);
      background: #15263b;
      color: transparent;
      font-size: 2rem;
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: transform 0.25s ease, background 0.25s ease;
      user-select: none;
    }

    .card.flipped {
      background: #f8fafc;
      color: #071127;
      transform: translateY(-2px);
    }

    button,
    .back-link {
      width: 100%;
      padding: 12px 0;
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, #38bdf8 0%, #8b5cf6 100%);
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      display: inline-block;
      margin-top: 10px;
    }

    button:hover,
    .back-link:hover {
      opacity: 0.95;
    }

    .message {
      margin-top: 12px;
      min-height: 24px;
      text-align: center;
      color: #cbd5e1;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="game">
    <h1>Jogo da Memória</h1>

    <!-- Área onde mostramos movimentos e pares acertados -->
    <div class="status">
      <span>Movimentos: <strong id="moves">0</strong></span>
      <span>Pares: <strong id="pairs">0</strong>/4</span>
    </div>

    <!-- Tabuleiro com as cartas do jogo -->
    <div class="board" id="board"></div>

    <button id="restart" type="button">Reiniciar</button>
    <a class="back-link" href="index.html">Voltar ao Portal</a>
    <p class="message" id="message"></p>
  </div>

  <script>
    // Símbolos usados no jogo da memória; cada símbolo aparece em dois cards.
    const symbols = ['🍎', '🍌', '🍓', '🍇'];

    const board = document.getElementById('board');
    const movesCounter = document.getElementById('moves');
    const pairsCounter = document.getElementById('pairs');
    const message = document.getElementById('message');
    const restartButton = document.getElementById('restart');

    let cards = [];
    let flipped = [];
    let moves = 0;
    let pairs = 0;
    let locked = false;

    // Prepara o tabuleiro embaralhado e mostra as cartas iniciais
    function setupGame() {
      cards = shuffle([...symbols, ...symbols]);
      board.innerHTML = '';
      flipped = [];
      moves = 0;
      pairs = 0;
      locked = false;
      movesCounter.textContent = '0';
      pairsCounter.textContent = '0';
      message.textContent = '';

      cards.forEach((symbol, index) => {
        const card = document.createElement('button');
        card.className = 'card';
        card.type = 'button';
        card.dataset.symbol = symbol;
        card.dataset.index = index;
        card.textContent = symbol;

        // Ao clicar, tentamos virar a carta
        card.addEventListener('click', () => flipCard(card));
        board.appendChild(card);
      });
    }

    // Embaralha as cartas usando Fisher-Yates para gerar um novo jogo justo
    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    // Altera o estado de uma carta quando o jogador clica nela
    function flipCard(card) {
      if (locked || card.classList.contains('flipped')) {
        return; // não permite virar carta se o tabuleiro estiver bloqueado
      }

      card.classList.add('flipped');
      flipped.push(card);

      if (flipped.length === 2) {
        moves += 1;
        movesCounter.textContent = String(moves);
        checkMatch();
      }
    }

    // Compara as duas cartas viradas e atualiza o jogo
    function checkMatch() {
      const [first, second] = flipped;
      const sameSymbol = first.dataset.symbol === second.dataset.symbol;

      if (sameSymbol) {
        pairs += 1;
        pairsCounter.textContent = String(pairs);
        flipped = [];

        if (pairs === symbols.length) {
          message.textContent = 'Parabéns! Você encontrou todos os pares.';
        }
        return;
      }

      // Se não for par, desvira as cartas após um pequeno atraso
      locked = true;
      setTimeout(() => {
        first.classList.remove('flipped');
        second.classList.remove('flipped');
        flipped = [];
        locked = false;
      }, 800);
    }

    restartButton.addEventListener('click', setupGame);
    setupGame();
  </script>
</body>
</html>
